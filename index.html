<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Current Weather App</h1>
    </div>

    <!-- Main Weather Container -->
    <div class="container">

        <!-- Search Section -->
        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter City Name"
                spellcheck="false">

            <button id="searchBtn">
                <img src="./Images/search.png" alt="Search">
            </button>
        </div>

        <!-- Error Message -->
        <div class="error">
            <p>Invalid City Name</p>
        </div>

        <!-- Weather Card -->
        <div class="weather-card">

            <!-- Weather Icon -->
            <img
                src="./Images/sun.png"
                alt="Weather Icon"
                id="weatherIcon"
                class="weather-icon">

            <!-- Temperature -->
            <h1 id="temperature">25°C</h1>

            <!-- City Name -->
            <h2 id="cityName">City Name</h2>

            <!-- Weather Description -->
            <p id="description">Clear Sky</p>

            <!-- Weather Details -->
            <div class="details">

                <!-- Humidity -->
                <div class="detail-box">
                    <img
                        src="./Images/humidity.png"
                        alt="Humidity">

                    <div>
                        <p id="humidity">60%</p>
                        <small>Humidity</small>
                    </div>
                </div>

                <!-- Wind Speed -->
                <div class="detail-box">
                    <img
                        src="./Images/wind.png"
                        alt="Wind">

                    <div>
                        <p id="windSpeed">10 km/h</p>
                        <small>Wind Speed</small>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
